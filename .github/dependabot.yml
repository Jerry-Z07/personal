# To get started with Dependabot version updates, you'll need to specify which
# package ecosystems to update and where the package manifests are located.
# Please see the documentation for all configuration options:
# https://docs.github.com/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file

version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "deps"
    labels:
      - "dependencies"
    groups:
      # React 生态：react/react-dom 必须同步更新，否则运行时崩溃
      react:
        patterns:
          - "react"
          - "react-dom"
          - "@types/react"
          - "@types/react-dom"
          - "react-router"
      # Vite 生态：核心与插件一起更新，避免插件兼容性问题
      vite:
        patterns:
          - "vite"
          - "@vitejs/*"
          - "@tailwindcss/vite"
      # Tailwind 生态：引擎与工具链同步
      tailwind:
        patterns:
          - "tailwindcss"
          - "@tailwindcss/*"
          - "tailwind-merge"
          - "postcss"
          - "autoprefixer"
      # TypeScript + ESLint：类型检查与代码规范工具链同步
      typescript-eslint:
        patterns:
          - "typescript"
          - "@typescript-eslint/*"
          - "eslint"
          - "@eslint/js"
          - "eslint-plugin-react-hooks"
          - "eslint-plugin-react-refresh"
          - "globals"
